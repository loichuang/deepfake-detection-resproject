# Jupytext configuration — applies to every notebook under this project.
#
# Each notebook lives as TWO synchronized files :
#   - 01_encoder.py     (source of truth, git-friendly, percent-cell format)
#   - 01_encoder.ipynb  (Jupyter-friendly, holds outputs, git-ignored)
#
# When you edit either file and save it, jupytext rewrites the other.
# We only version the .py side via git; the .ipynb is local-only.

formats = "ipynb,py:percent"
notebook_metadata_filter = "-all"
cell_metadata_filter = "-all"
